name: docker123
version: v0.0.1
description: |-
  Devsy on Docker
options:
  LOCATION:
    description: The location Devsy should use
  INACTIVITY_TIMEOUT:
    description: The timeout until the machine will be stopped
    default: 30s
agent:
  local: true
  docker:
    install: false
  inactivityTimeout: ${INACTIVITY_TIMEOUT}
exec:
  create: |-
    mkdir -p ${LOCATION}/${MACHINE_ID}
    echo "RUNNING" > ${LOCATION}/${MACHINE_ID}/status.txt

  delete: |-
    rm -R ${LOCATION}/${MACHINE_ID}

  start: |-
    echo "RUNNING" > ${LOCATION}/${MACHINE_ID}/status.txt

  stop: |-
    echo "STOPPED" > ${LOCATION}/${MACHINE_ID}/status.txt

  status: |-
    cat ${LOCATION}/${MACHINE_ID}/status.txt 2>/dev/null || echo "NOTFOUND"

  command: |-
    "${DEVSY}" helper sh -c "${COMMAND}"
