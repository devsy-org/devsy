name: docker123
version: 0.0.1
description: |-
  Devsy on Kubernetes
options:
  NAMESPACE:
    description: The namespace to use
    default: devsy-e2e
  INACTIVITY_TIMEOUT:
    description: The timeout until the pod will be stopped
    default: 300s
agent:
  path: /usr/local/bin/devsy
  inactivityTimeout: ${INACTIVITY_TIMEOUT}
  exec:
    shutdown: |-
      kill 1
exec:
  command: |-
    docker exec -i devsy-${MACHINE_ID} sh -c "${COMMAND}"
  stop: |-
    docker stop devsy-${MACHINE_ID}
  start: |-
    docker start devsy-${MACHINE_ID}
    sleep 5
  status: |-
    STATUS=$(docker inspect devsy-${MACHINE_ID} 2>/dev/null | ${DEVSY} internal helper json get "[0].State.Status" || true)
    if [ -z $STATUS ]; then
      echo "NOTFOUND"
    else
      if [ "$STATUS" = "exited" ]; then
        echo "STOPPED"
      elif [ "$STATUS" = "running" ]; then
        echo "RUNNING"
      else
        echo "BUSY"
      fi
    fi
  create: |-
    docker run -d --privileged --name devsy-${MACHINE_ID} docker
    docker exec devsy-${MACHINE_ID} mkdir /etc/init.d
    sleep 5
  delete: |-
    docker stop devsy-${MACHINE_ID} && docker rm devsy-${MACHINE_ID}
