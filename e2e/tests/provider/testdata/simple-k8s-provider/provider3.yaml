name: provider3
version: 0.0.1
description: |-
  Devsy on Kubernetes
options:
  NAMESPACE:
    required: true
    description: The namespace to use
    command: |-
      NAMESPACE=$(kubectl config view --minify -o jsonpath='{..namespace}' 2>/dev/null || true)
      if [ -z "${NAMESPACE}" ]; then
        NAMESPACE=default
      fi
      echo $NAMESPACE
  TEMPLATE:
    required: true
    type: multiline
agent:
  path: /tmp/devsy
exec:
  command: |-
    kubectl exec -n "${NAMESPACE}" -c devsy-container -i devsy-${MACHINE_ID} -- sh -c "${COMMAND}"
  create: |-
    kubectl create -n "${NAMESPACE}" -f - << EOF
    apiVersion: v1
    kind: Pod
    metadata:
      name: devsy-${MACHINE_ID}
      labels:
        app: devsy
    spec:
      volumes:
        - name: devsy-storage
          emptyDir: {}
      containers:
        - name: devsy-container
          image: docker:dind
          volumeMounts:
          - mountPath: /var/lib/docker
            name: devsy-storage
            subPath: var/lib/docker
          - mountPath: /root
            name: devsy-storage
            subPath: root
          securityContext:
            privileged: true
    EOF
  delete: |-
    kubectl delete pod devsy-${MACHINE_ID} -n "${NAMESPACE}" || true
