name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: Check Contributor License Agreement
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issue_comment' &&
        (github.event.comment.body == 'recheck' ||
         github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
      github.event_name == 'pull_request_target'
    steps:
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/.github/CLA.md"
          branch: "cla-signatures"
          allowlist: "renovate[bot],dependabot[bot],*[bot]"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: >
            All contributors have signed the CLA.
          custom-notsigned-prcomment: >
            Thank you for your contribution. Before we can merge it, we need you
            to agree to our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/.github/CLA.md).
            Please read it carefully — it grants Devsy the right to relicense your
            contribution, including under proprietary terms. If you agree, post a
            comment on this pull request with exactly the following text:
