name: Semantic Release

on:
  push:
    branches: [main, release]
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run in dry-run mode (no release created)
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.DEVSY_GITHUB_APP_ID }}
          private-key: ${{ secrets.DEVSY_GITHUB_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "devsy-bot[bot]"
          git config user.email "198134133+devsy-bot[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run semantic-release
        run: npx semantic-release ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
