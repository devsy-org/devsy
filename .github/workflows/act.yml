name: Act

on:
  workflow_dispatch:
    inputs:
      test_focus:
        description: focus for E2E tests
        required: false
        default: ""

jobs:
  e2e-test:
    name: E2E Tests
    runs-on: js-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: install task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: install goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: check docker access
        run: docker version && docker ps -a

      - name: build test binary
        run: task cli:test:e2e:build

      - name: generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DEVSY_GITHUB_APP_ID }}
          private-key: ${{ secrets.DEVSY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: run tests
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GH_ACCESS_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          GH_CREDENTIAL_USERNAME: x-access-token
        run: |
          GH_USERNAME="${GH_USERNAME}" \
            GH_ACCESS_TOKEN="${GH_ACCESS_TOKEN}" \
            GH_CREDENTIAL_USERNAME="${GH_CREDENTIAL_USERNAME}" \
            KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}" \
            PATH="${PATH}" \
            GOROOT="${GOROOT}" \
            ${{ github.event.inputs.test_focus == '' && 'task cli:test:e2e' || format('task cli:test:e2e:focus -- "{0}"', github.event.inputs.test_focus) }}

  build-ui:
    name: Build User Interface
    runs-on: js-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: install dependencies
        working-directory: ./desktop
        run: npm ci

      - name: check
        working-directory: ./desktop
        run: npm run check

      - name: test
        working-directory: ./desktop
        run: npm run test

  build-desktop:
    name: Build Desktop App
    runs-on: js-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: build CLI binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o desktop/resources/bin/devsy .
          chmod +x desktop/resources/bin/devsy

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: install setuptools
        run: pip install setuptools

      - name: install dependencies
        working-directory: ./desktop
        run: npm ci

      - name: install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: build and test
        working-directory: ./desktop
        run: |
          npm run electron:build
          xvfb-run npx playwright test

      - name: package with electron-builder
        working-directory: ./desktop
        run: npx electron-builder --linux --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: upload desktop linux artifact for flatpak
        uses: actions/upload-artifact@v4 # pin to v4 for act support
        with:
          name: devsy-flatpak
          path: desktop/release/*.deb

  build-flatpak:
    name: Build Flatpak
    runs-on: js-latest
    needs: [build-desktop]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: download desktop linux artifact
        uses: actions/download-artifact@v4 # pin to v4 for act support
        with:
          name: devsy-flatpak
          path: desktop/flatpak/

      - name: find and rename .deb file
        working-directory: desktop/flatpak
        run: |
          DEB=$(find . -maxdepth 1 -name '*.deb' -print -quit)
          if [ -n "$DEB" ]; then
            mv "$DEB" devsy-desktop.deb
          else
            echo "No .deb file found"
            exit 1
          fi

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Devsy.flatpak
          manifest-path: desktop/flatpak/sh.devsy.app.yml
          upload-artifact: false
