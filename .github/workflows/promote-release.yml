name: Promote RC to Stable

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to promote (e.g., v1.3.0-rc.1)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  promote:
    name: Promote RC to Stable Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.DEVSY_GITHUB_APP_ID }}
          private-key: ${{ secrets.DEVSY_GITHUB_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: validate RC tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RC_TAG: ${{ inputs.rc_tag }}
        run: |
          if ! echo "$RC_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$'; then
            echo "::error::Invalid RC tag format: $RC_TAG (expected v*.*.*-rc*)"
            exit 1
          fi

          RELEASE=$(gh release view "$RC_TAG" --json tagName,isPrerelease 2>/dev/null || true)
          if [ -z "$RELEASE" ]; then
            echo "::error::Release $RC_TAG not found"
            exit 1
          fi

          IS_PRERELEASE=$(echo "$RELEASE" | jq -r '.isPrerelease')
          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "::error::Release $RC_TAG is not a prerelease"
            exit 1
          fi

          echo "RC release $RC_TAG validated"

      - name: derive stable version
        id: version
        env:
          RC_TAG: ${{ inputs.rc_tag }}
        run: |
          STABLE_TAG="${RC_TAG%%-rc*}"
          echo "stable_tag=$STABLE_TAG" >> "$GITHUB_OUTPUT"

          COMMIT_SHA=$(git rev-list -n 1 "$RC_TAG")
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

          echo "Stable tag: $STABLE_TAG at commit: $COMMIT_SHA"

      - name: fetch RC release notes
        id: rc_notes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RC_TAG: ${{ inputs.rc_tag }}
        run: |
          BODY=$(gh release view "$RC_TAG" --json body -q .body)
          BODY=$(echo "$BODY" | sed "1s/-rc\.[0-9]*//" )
          { echo "body<<EOF"; echo "$BODY"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: create stable release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.version.outputs.stable_tag }}
          target_commitish: ${{ steps.version.outputs.commit_sha }}
          name: ${{ steps.version.outputs.stable_tag }}
          body: ${{ steps.rc_notes.outputs.body }}
          draft: false
          prerelease: false
          make_latest: true

      - name: trigger full rebuild
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ steps.version.outputs.stable_tag }}
        run: |
          gh workflow run release.yml \
            --field tag="$STABLE_TAG"

          echo "Triggered release.yml rebuild for $STABLE_TAG"
