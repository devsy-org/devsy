name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.DEVSY_GITHUB_APP_ID }}
          private-key: ${{ secrets.DEVSY_GITHUB_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          autoMergeRequest: true

  auto-merge-rc:
    name: Auto-merge RC Release PR
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ !needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.DEVSY_GITHUB_APP_ID }}
          private-key: ${{ secrets.DEVSY_GITHUB_APP_PRIVATE_KEY }}

      - name: auto-merge RC release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR=$(gh pr list --label "autorelease: pending" --json number,title --jq '.[0]')
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No pending release PR found"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR" | jq -r '.number')
          PR_TITLE=$(echo "$PR" | jq -r '.title')

          if echo "$PR_TITLE" | grep -qiE '\-rc[0-9]*'; then
            echo "Enabling auto-merge for RC release PR #$PR_NUMBER: $PR_TITLE"
            gh pr merge "$PR_NUMBER" --auto --squash
          else
            echo "Skipping auto-merge for non-RC release PR #$PR_NUMBER: $PR_TITLE"
          fi
