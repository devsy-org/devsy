name: Release
on:
  release:
    types: [prereleased]
  workflow_dispatch:
    inputs:
      tag:
        description: tag name for the release (e.g., v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI Binary on ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
          - runner: macos-latest
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --id devsy-${{ steps.os.outputs.runner_os }} --snapshot
        env:
          DEVSY_CLI_VERSION: ${{ inputs.tag || github.ref_name }}

      - uses: actions/upload-artifact@v7
        with:
          name: devsy-${{ steps.os.outputs.runner_os }}
          path: dist/devsy-${{ steps.os.outputs.runner_os }}_*/devsy-${{ steps.os.outputs.runner_os }}-*

  build-desktop:
    name: Build Desktop App for ${{ matrix.arch }} on ${{ matrix.runner }}
    needs: build-cli
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            tauri_include_updater_json: true
            tauri_ci: true

          - arch: amd64
            target: x86_64-apple-darwin
            runner: macos-latest
            tauri_include_updater_json: true
            tauri_ci: true

          - arch: arm64
            target: aarch64-apple-darwin
            runner: macos-latest
            tauri_include_updater_json: true
            tauri_ci: false # https://github.com/tauri-apps/tauri/issues/3055

          - arch: amd64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            tauri_include_updater_json: true
            tauri_ci: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"
          shared-key: "desktop-${{ matrix.runner }}"

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - name: download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: devsy-*
          path: ${{ runner.temp }}/devsy-bin/
          merge-multiple: true

      - name: setup executable
        shell: bash
        working-directory: ./desktop/src-tauri
        run: |
          TEMP_DIR="${{ runner.temp }}"
          if [ "${{ runner.os }}" == "Windows" ]; then
            TEMP_DIR="${TEMP_DIR//\\//}"
          fi

          ls -R "$TEMP_DIR/devsy-bin/"
          mkdir -p ./bin/
          find "$TEMP_DIR/devsy-bin/" -type f -name "devsy-*" -exec cp {} ./bin \;
          find ./bin -type f -name "devsy-*" -exec chmod +x {} \;
          mkdir ../../dist/ && cp ./bin/* ../../dist/
          ls -R ./bin/

      - name: generate pro provider
        if: runner.os == 'Linux'
        working-directory: ./hack/pro
        run: go run ./main.go ${{ inputs.tag || github.ref_name }} ../../desktop/src-tauri/bin > ../../dist/provider.yaml

      - name: rename binaries for desktop build
        shell: bash
        working-directory: ./desktop/src-tauri
        run: |
          find ./bin -type f -name "devsy-linux-amd64" -exec mv {} ./bin/devsy-x86_64-unknown-linux-gnu \;
          find ./bin -type f -name "devsy-linux-arm64" -exec mv {} ./bin/devsy-aarch64-unknown-linux-gnu \;
          find ./bin -type f -name "devsy-darwin-amd64" -exec mv {} ./bin/devsy-x86_64-apple-darwin \;
          find ./bin -type f -name "devsy-darwin-arm64" -exec mv {} ./bin/devsy-aarch64-apple-darwin \;
          find ./bin -type f -name "devsy-windows-amd64.exe" -exec mv {} ./bin/devsy-x86_64-pc-windows-msvc.exe \;
          find ./bin -type f -name "devsy-windows-arm64.exe" -exec mv {} ./bin/devsy-aarch64-pc-windows-msvc.exe \;
          ls -R ./bin/

      - name: install linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: install desktop dependencies
        shell: bash
        working-directory: ./desktop
        run: |
          yarn install --frozen-lockfile
          VERSION=${{ inputs.tag || github.ref_name }}
          VERSION="${VERSION#v}"
          yarn version --new-version "$VERSION" --no-git-tag-version

      - name: tauri build
        uses: tauri-apps/tauri-action@v0.6
        with:
          projectPath: "./desktop"
          args: "--target ${{ matrix.target }}"
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Devsy ${{ inputs.tag || github.ref_name }}"
          releaseDraft: true
          generateReleaseNotes: true
          includeUpdaterJson: ${{ matrix.tauri_include_updater_json }}
          assetNamePattern: "[name]_[platform]_[arch][ext]"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: "${{ secrets.DEVSY_TAURI_PRIVATE_SIGNING_KEY }}"
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: "${{ secrets.DEVSY_TAURI_PRIVATE_SIGNING_KEY_PASSWORD }}"
          CI: ${{ matrix.tauri_ci }}

      - name: upload cli assets
        uses: softprops/action-gh-release@v3
        if: runner.os == 'Linux'
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./dist/*

      - name: upload desktop linux artifact for flatpak
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: devsy-flatpak
          path: ./desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/Devsy_*_amd64.deb

  build-flatpak:
    name: Build Flatpak
    # Use Ubuntu 22.04 to build the flatpak for compatibility with older glibc versions.
    # For more details, see https://v2.tauri.app/distribute/appimage/
    runs-on: ubuntu-22.04
    needs: [build-desktop]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: clone shared-modules
        run: git clone https://github.com/flathub/shared-modules.git desktop/flatpak/shared-modules

      - name: download desktop linux artifact
        uses: actions/download-artifact@v8
        with:
          name: devsy-flatpak
          path: /tmp/devsy/

      - name: update flatpak metadata version and date
        shell: bash
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ inputs.tag || github.ref_name }}"

          sed -i "s/__VERSION__/${VERSION}/g" ./desktop/flatpak/Devsy.metainfo.xml
          sed -i "s/__DATE__/${DATE}/g" ./desktop/flatpak/Devsy.metainfo.xml

      - name: copy flatpak files to build workspace
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/desktop/flatpak-build/"
          cp -R ./desktop/flatpak/* "$GITHUB_WORKSPACE/desktop/flatpak-build/"

      - name: prepare flatpak assets
        shell: bash
        run: |
          DEB_SHA256=$(sha256sum /tmp/devsy/Devsy_*_amd64.deb | cut -d' ' -f1)
          META_SHA256=$(sha256sum ./desktop/flatpak/Devsy.metainfo.xml | cut -d' ' -f1)
          DESKTOP_SHA256=$(sha256sum ./desktop/flatpak/Devsy.desktop | cut -d' ' -f1)

          sed -i "s/\${VERSION}/${VERSION}/g" ./desktop/flatpak/sh.devsy.devsy.yml
          sed -i "s/\${SHA256}/${DEB_SHA256}/g" ./desktop/flatpak/sh.devsy.devsy.yml
          sed -i "s/\${DESKTOP_SHA256}/${DESKTOP_SHA256}/g" ./desktop/flatpak/sh.devsy.devsy.yml
          sed -i "s/\${META_SHA256}/${META_SHA256}/g" ./desktop/flatpak/sh.devsy.devsy.yml

      - name: upload flatpak assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./desktop/flatpak/Devsy.metainfo.xml
            ./desktop/flatpak/Devsy.desktop
            ./desktop/flatpak/sh.devsy.devsy.yml

      - name: restore flatpak manifest for build
        shell: bash
        run: |
          rm -rf "$GITHUB_WORKSPACE/desktop/flatpak/"
          mv "$GITHUB_WORKSPACE/desktop/flatpak-build/" "$GITHUB_WORKSPACE/desktop/flatpak/"

      # Use GITHUB_WORKSPACE in containers because the path differs from github.workspace
      # for more details, see https://github.com/actions/checkout/issues/785
      - name: prepare flatpak manifest for build
        shell: bash
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s|url: https://github.com/devsy-org/devsy/releases/download/\${VERSION}/Devsy_linux_amd64.deb|path: /tmp/devsy/Devsy_${VERSION}_amd64.deb|" "$GITHUB_WORKSPACE/desktop/flatpak/sh.devsy.devsy.yml"
          sed -i "s|url: https://github.com/devsy-org/devsy/releases/download/\${VERSION}/Devsy.desktop|path: $GITHUB_WORKSPACE/desktop/flatpak/Devsy.desktop|" "$GITHUB_WORKSPACE/desktop/flatpak/sh.devsy.devsy.yml"
          sed -i "s|url: https://github.com/devsy-org/devsy/releases/download/\${VERSION}/Devsy.metainfo.xml|path: $GITHUB_WORKSPACE/desktop/flatpak/Devsy.metainfo.xml|" "$GITHUB_WORKSPACE/desktop/flatpak/sh.devsy.devsy.yml"
          sed -i "/sha256: \${SHA256}/d" "$GITHUB_WORKSPACE/desktop/flatpak/sh.devsy.devsy.yml"
          sed -i "/sha256: \${DESKTOP_SHA256}/d" "$GITHUB_WORKSPACE/desktop/flatpak/sh.devsy.devsy.yml"
          sed -i "/sha256: \${META_SHA256}/d" "$GITHUB_WORKSPACE/desktop/flatpak/sh.devsy.devsy.yml"

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Devsy.flatpak
          manifest-path: desktop/flatpak/sh.devsy.devsy.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

      - name: upload flatpak bundle
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./Devsy.flatpak
            ./Devsy-x86_64.flatpak.zip

  prerelease:
    name: Publish Prerelease
    needs: [build-desktop, build-flatpak]
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          draft: false
