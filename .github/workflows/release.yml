name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: tag name for the release (e.g., v1.0.0)
        required: true
        type: string

jobs:
  build-cli:
    name: Build CLI Binary on ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
          - runner: macos-latest
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --id devsy-${{ steps.os.outputs.runner_os }} --snapshot
        env:
          DEVSY_CLI_VERSION: ${{ inputs.tag || github.ref_name }}
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}

      - uses: actions/upload-artifact@v7
        with:
          name: devsy-${{ steps.os.outputs.runner_os }}
          path: dist/devsy-${{ steps.os.outputs.runner_os }}_*/devsy-${{ steps.os.outputs.runner_os }}-*

  build-desktop:
    name: Build Desktop App (${{ matrix.name }})
    needs: build-cli
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            go-os: linux
            go-arch: amd64
            builder-args: --linux
          - name: macos-arm64
            os: macos-latest
            go-os: darwin
            go-arch: arm64
            builder-args: --mac --arm64
          - name: macos-x64
            os: macos-latest
            go-os: darwin
            go-arch: amd64
            builder-args: --mac --x64
          - name: windows-x64
            os: windows-2022
            go-os: windows
            go-arch: amd64
            builder-args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - name: download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: devsy-*
          path: ${{ runner.temp }}/devsy-bin/
          merge-multiple: true

      - name: inventory and flatten CLI artifacts
        shell: bash
        env:
          BIN_DIR: ${{ runner.temp }}/devsy-bin
        run: |
          python3 <<'PY'
          import hashlib
          import os
          import shutil
          import subprocess
          from pathlib import Path

          bin_dir = Path(os.environ["BIN_DIR"])

          def file_arch(p: Path) -> str:
              try:
                  return subprocess.check_output(["file", "-b", str(p)], text=True).strip()
              except (FileNotFoundError, subprocess.CalledProcessError):
                  return "<file unavailable>"

          def sha256(p: Path) -> str:
              h = hashlib.sha256()
              with p.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          print("::group::Downloaded CLI artifacts (pre-flatten)")
          for p in sorted(bin_dir.rglob("*")):
              if p.is_file():
                  print(f"{p.relative_to(bin_dir)}  size={p.stat().st_size}  "
                        f"sha256={sha256(p)}  arch={file_arch(p)}")
          print("::endgroup::")

          for nested in sorted(p for p in bin_dir.rglob("*") if p.is_file() and p.parent != bin_dir):
              dest = bin_dir / nested.name
              if dest.exists():
                  raise SystemExit(f"flatten collision: {nested} -> {dest} (already exists)")
              shutil.move(str(nested), str(dest))

          for d in sorted((p for p in bin_dir.rglob("*") if p.is_dir()), reverse=True):
              try:
                  d.rmdir()
              except OSError:
                  pass

          print("::group::Flattened CLI binaries")
          for p in sorted(bin_dir.iterdir()):
              if p.is_file():
                  print(f"{p.name}  size={p.stat().st_size}  arch={file_arch(p)}")
          print("::endgroup::")
          PY

      - name: setup CLI binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_GO_OS: ${{ matrix.go-os }}
          MATRIX_GO_ARCH: ${{ matrix.go-arch }}
        run: |
          set -euo pipefail
          TEMP_DIR="${{ runner.temp }}"
          SRC="$TEMP_DIR/devsy-bin/devsy-${MATRIX_GO_OS}-${MATRIX_GO_ARCH}"
          DST="desktop/resources/bin/devsy"

          if [ ! -f "$SRC" ]; then
            echo "::error::expected CLI binary missing: $SRC"
            ls -la "$TEMP_DIR/devsy-bin"
            exit 1
          fi

          mkdir -p desktop/resources/bin
          cp "$SRC" "$DST"
          chmod +x "$DST"

          src_sha=$(shasum -a 256 "$SRC" | awk '{print $1}')
          dst_sha=$(shasum -a 256 "$DST" | awk '{print $1}')
          arch_desc=$(file -b "$DST")
          echo "matrix=${MATRIX_NAME} expected=devsy-${MATRIX_GO_OS}-${MATRIX_GO_ARCH}"
          echo "src=$SRC sha256=$src_sha"
          echo "dst=$DST sha256=$dst_sha"
          echo "dst arch=$arch_desc"

          if [ "$src_sha" != "$dst_sha" ]; then
            echo "::error::sha256 mismatch between source and destination"
            exit 1
          fi

          case "${MATRIX_GO_OS}-${MATRIX_GO_ARCH}" in
            darwin-arm64) echo "$arch_desc" | grep -q 'arm64'   ;;
            darwin-amd64) echo "$arch_desc" | grep -q 'x86_64'  ;;
            linux-amd64)  echo "$arch_desc" | grep -q 'x86-64'  ;;
            linux-arm64)  echo "$arch_desc" | grep -q 'aarch64' ;;
            *)
              echo "::warning::no arch assertion for ${MATRIX_GO_OS}-${MATRIX_GO_ARCH}"
              ;;
          esac

          # Stage binaries for dist/ upload and provider generation.
          mkdir -p dist/
          find "$TEMP_DIR/devsy-bin/" -type f -name "devsy-*" -exec cp {} dist/ \;

      - name: setup CLI binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "${{ runner.temp }}/devsy-bin/devsy-windows-amd64.exe"
          $dst = "desktop/resources/bin/devsy.exe"
          if (-not (Test-Path $src)) {
            Write-Error "expected CLI binary missing: $src"
            Get-ChildItem "${{ runner.temp }}/devsy-bin"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path desktop/resources/bin | Out-Null
          Copy-Item $src $dst
          $srcSha = (Get-FileHash -Algorithm SHA256 $src).Hash
          $dstSha = (Get-FileHash -Algorithm SHA256 $dst).Hash
          Write-Host "src=$src sha256=$srcSha"
          Write-Host "dst=$dst sha256=$dstSha"
          if ($srcSha -ne $dstSha) {
            Write-Error "sha256 mismatch between source and destination"
            exit 1
          }

      - name: generate pro provider
        if: matrix.name == 'linux-x64'
        working-directory: ./hack/pro
        env:
          PARTIAL: "true"
        run: go run ./main.go ${{ inputs.tag || github.ref_name }} ../../dist > ../../dist/provider.yaml

      - name: configure Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          echo "GYP_MSVS_OVERRIDE_PATH=$vsPath" >> $env:GITHUB_ENV

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: install setuptools
        run: pip install setuptools

      - name: install dependencies
        working-directory: desktop
        run: npm ci

      - name: set version
        shell: bash
        working-directory: desktop
        run: |
          VERSION=${{ inputs.tag || github.ref_name }}
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: install xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: build desktop app
        working-directory: desktop
        run: npx electron-vite build
        env:
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}

      - name: package and publish with electron-builder (macOS, signed)
        if: runner.os == 'macOS'
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder-args }} --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.DEVSY_APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DEVSY_APPLE_CSC_PASSWORD }}
          APPLE_ID: ${{ secrets.DEVSY_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DEVSY_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DEVSY_APPLE_TEAM_ID }}

      - name: package and publish with electron-builder (non-macOS)
        if: runner.os != 'macOS'
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder-args }} --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: verify packaged macOS app embedded CLI arch
        if: runner.os == 'macOS'
        shell: bash
        env:
          MATRIX_GO_ARCH: ${{ matrix.go-arch }}
        working-directory: desktop
        run: |
          set -euo pipefail
          app_dir=$(find release -maxdepth 2 -type d -name 'Devsy.app' | head -n1)
          if [ -z "$app_dir" ]; then
            echo "::error::no Devsy.app bundle found under desktop/release/"
            ls -la release || true
            exit 1
          fi
          embedded="$app_dir/Contents/Resources/bin/devsy"
          if [ ! -f "$embedded" ]; then
            echo "::error::embedded CLI binary missing: $embedded"
            exit 1
          fi
          arch_desc=$(file -b "$embedded")
          sha=$(shasum -a 256 "$embedded" | awk '{print $1}')
          echo "embedded=$embedded"
          echo "sha256=$sha"
          echo "arch=$arch_desc"
          case "$MATRIX_GO_ARCH" in
            arm64) echo "$arch_desc" | grep -q 'arm64'  ;;
            amd64) echo "$arch_desc" | grep -q 'x86_64' ;;
            *)
              echo "::error::unexpected matrix go-arch: $MATRIX_GO_ARCH"
              exit 1
              ;;
          esac

      - name: upload desktop artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.rpm

      - name: rewrite manifest URLs to GitHub Release assets
        if: hashFiles('desktop/release/latest*.yml', 'desktop/release/beta*.yml') != ''
        # Windows defaults to pwsh; `$REPO`/`$TAG` would be empty PowerShell vars.
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          go run hack/rewrite_manifest_urls/main.go desktop/release/ "$REPO" "$TAG"

      - name: upload update metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.name }}
          path: |
            desktop/release/latest*.yml
            desktop/release/beta*.yml
          if-no-files-found: ignore

      - name: upload cli assets
        uses: softprops/action-gh-release@v3
        if: matrix.name == 'linux-x64'
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./dist/*

      - name: upload desktop linux artifact for flatpak
        if: matrix.name == 'linux-x64'
        uses: actions/upload-artifact@v7
        with:
          name: devsy-flatpak
          path: desktop/release/*.deb

  deploy-update-metadata:
    name: Deploy Electron Update Metadata
    needs: [build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: download update metadata artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: update-metadata-*
          path: metadata/

      - name: prepare publish dir
        run: mkdir -p publish-dir/desktop

      - name: merge macOS metadata from separate arch builds
        run: go run hack/merge_mac_metadata/main.go metadata/ publish-dir/desktop/

      - name: overlay non-mac metadata files (stable release)
        if: ${{ !github.event.release.prerelease }}
        run: |
          find metadata/ -name 'latest-linux.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'latest.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'beta-linux.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'beta.yml' -exec cp {} publish-dir/desktop/ \;

      - name: overlay non-mac metadata files (prerelease)
        if: ${{ github.event.release.prerelease }}
        run: |
          find metadata/ -name 'beta-linux.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'beta.yml' -exec cp {} publish-dir/desktop/ \;

      - name: deploy to Netlify (dl.devsy.sh)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./publish-dir
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DL_SITE_ID }}

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: [build-desktop]
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: download desktop linux artifact
        uses: actions/download-artifact@v8
        with:
          name: devsy-flatpak
          path: desktop/flatpak/

      - name: find and rename .deb file
        working-directory: desktop/flatpak
        run: |
          DEB=$(find . -maxdepth 1 -name '*.deb' -print -quit)
          if [ -n "$DEB" ]; then
            mv "$DEB" devsy-desktop.deb
          else
            echo "No .deb file found"
            exit 1
          fi

      - name: build flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Devsy.flatpak
          manifest-path: desktop/flatpak/sh.devsy.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

      - name: upload flatpak bundle
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./Devsy.flatpak

  prerelease:
    name: Publish Prerelease
    needs: [build-desktop, build-flatpak, deploy-update-metadata]
    permissions:
      contents: write
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          draft: false
