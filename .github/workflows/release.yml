name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: tag name for the release (e.g., v1.0.0)
        required: true
        type: string

jobs:
  build-cli:
    name: Build CLI Binary on ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
          - runner: macos-latest
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --id devsy-${{ steps.os.outputs.runner_os }} --snapshot
        env:
          DEVSY_CLI_VERSION: ${{ inputs.tag || github.ref_name }}
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}

      - uses: actions/upload-artifact@v7
        with:
          name: devsy-${{ steps.os.outputs.runner_os }}
          path: dist/devsy-${{ steps.os.outputs.runner_os }}_*/devsy-${{ steps.os.outputs.runner_os }}-*

  build-desktop:
    name: Build Desktop App (${{ matrix.name }})
    needs: build-cli
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            go-os: linux
            go-arch: amd64
            builder-args: --linux
          - name: macos-arm64
            os: macos-latest
            go-os: darwin
            go-arch: arm64
            builder-args: --mac --arm64
          - name: macos-x64
            os: macos-latest
            go-os: darwin
            go-arch: amd64
            builder-args: --mac --x64
          - name: windows-x64
            os: windows-2022
            go-os: windows
            go-arch: amd64
            builder-args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      # Build the embedded CLI binary directly for this matrix entry's
      # target arch instead of relying on cross-job artifact handoff. The
      # earlier upload/download/flatten/cp pipeline shipped the wrong
      # architecture into the macos-arm64 dmg (see v1.10.0-beta.29) — see
      # `.github/workflows/release.yml` history for the failure mode. Using
      # an inline build forces the binary to be the correct arch and lets
      # us assert it via `file` / `lipo` before electron-builder runs.
      - name: build embedded CLI binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ inputs.tag || github.ref_name }}
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}
          GOOS: ${{ matrix.go-os }}
          GOARCH: ${{ matrix.go-arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p desktop/resources/bin
          go build \
            -tags 'netgo osusergo' \
            -ldflags "-s -w -X main.build=${VERSION} -X main.commit=${GITHUB_SHA} -X github.com/devsy-org/devsy/pkg/version.version=${VERSION} -X github.com/devsy-org/devsy/pkg/telemetry/analytics.posthogAPIKey=${DEVSY_POSTHOG_API_KEY}" \
            -o desktop/resources/bin/devsy \
            .
          chmod +x desktop/resources/bin/devsy
          file desktop/resources/bin/devsy
          # Fail loudly if the embedded binary's arch does not match the matrix.
          case "${GOOS}-${GOARCH}" in
            darwin-arm64) file desktop/resources/bin/devsy | grep -q 'arm64'  ;;
            darwin-amd64) file desktop/resources/bin/devsy | grep -q 'x86_64' ;;
            linux-amd64)  file desktop/resources/bin/devsy | grep -q 'x86-64' ;;
            linux-arm64)  file desktop/resources/bin/devsy | grep -q 'aarch64' ;;
          esac

      - name: build embedded CLI binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ inputs.tag || github.ref_name }}
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}
        run: |
          New-Item -ItemType Directory -Force -Path desktop/resources/bin
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          $ldflags = "-s -w -X main.build=$env:VERSION -X main.commit=$env:GITHUB_SHA -X github.com/devsy-org/devsy/pkg/version.version=$env:VERSION -X github.com/devsy-org/devsy/pkg/telemetry/analytics.posthogAPIKey=$env:DEVSY_POSTHOG_API_KEY"
          go build -ldflags $ldflags -o desktop/resources/bin/devsy.exe .

      # The pro-provider generator needs every platform's CLI binary.
      # Only the linux-x64 desktop job runs that step, so only that job
      # needs to fetch the cross-arch binaries from the build-cli job.
      - name: download CLI artifacts (for provider generation)
        if: matrix.name == 'linux-x64'
        uses: actions/download-artifact@v8
        with:
          pattern: devsy-*
          path: ${{ runner.temp }}/devsy-bin/
          merge-multiple: true

      - name: stage CLI binaries for provider generation
        if: matrix.name == 'linux-x64'
        shell: bash
        run: |
          mkdir -p dist/
          find "${{ runner.temp }}/devsy-bin/" -type f -name "devsy-*" -exec cp {} dist/ \;

      - name: generate pro provider
        if: matrix.name == 'linux-x64'
        working-directory: ./hack/pro
        env:
          PARTIAL: "true"
        run: go run ./main.go ${{ inputs.tag || github.ref_name }} ../../dist > ../../dist/provider.yaml

      - name: configure Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          echo "GYP_MSVS_OVERRIDE_PATH=$vsPath" >> $env:GITHUB_ENV

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: install setuptools
        run: pip install setuptools

      - name: install dependencies
        working-directory: desktop
        run: npm ci

      - name: set version
        shell: bash
        working-directory: desktop
        run: |
          VERSION=${{ inputs.tag || github.ref_name }}
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: install xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: build desktop app
        working-directory: desktop
        run: npx electron-vite build
        env:
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}

      - name: package and publish with electron-builder (macOS, signed)
        if: runner.os == 'macOS'
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder-args }} --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.DEVSY_APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DEVSY_APPLE_CSC_PASSWORD }}
          APPLE_ID: ${{ secrets.DEVSY_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DEVSY_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DEVSY_APPLE_TEAM_ID }}

      - name: package and publish with electron-builder (non-macOS)
        if: runner.os != 'macOS'
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder-args }} --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: upload desktop artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.rpm

      - name: rewrite manifest URLs to GitHub Release assets
        if: hashFiles('desktop/release/latest*.yml', 'desktop/release/beta*.yml') != ''
        # Windows defaults to pwsh; `$REPO`/`$TAG` would be empty PowerShell vars.
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          go run hack/rewrite_manifest_urls/main.go desktop/release/ "$REPO" "$TAG"

      - name: upload update metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.name }}
          path: |
            desktop/release/latest*.yml
            desktop/release/beta*.yml
          if-no-files-found: ignore

      - name: upload cli assets
        uses: softprops/action-gh-release@v3
        if: matrix.name == 'linux-x64'
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./dist/*

      - name: upload desktop linux artifact for flatpak
        if: matrix.name == 'linux-x64'
        uses: actions/upload-artifact@v7
        with:
          name: devsy-flatpak
          path: desktop/release/*.deb

  deploy-update-metadata:
    name: Deploy Electron Update Metadata
    needs: [build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: download update metadata artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: update-metadata-*
          path: metadata/

      - name: prepare publish dir
        run: mkdir -p publish-dir/desktop

      - name: merge macOS metadata from separate arch builds
        run: go run hack/merge_mac_metadata/main.go metadata/ publish-dir/desktop/

      - name: overlay non-mac metadata files (stable release)
        if: ${{ !github.event.release.prerelease }}
        run: |
          find metadata/ -name 'latest-linux.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'latest.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'beta-linux.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'beta.yml' -exec cp {} publish-dir/desktop/ \;

      - name: overlay non-mac metadata files (prerelease)
        if: ${{ github.event.release.prerelease }}
        run: |
          find metadata/ -name 'beta-linux.yml' -exec cp {} publish-dir/desktop/ \;
          find metadata/ -name 'beta.yml' -exec cp {} publish-dir/desktop/ \;

      - name: deploy to Netlify (dl.devsy.sh)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./publish-dir
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DL_SITE_ID }}

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: [build-desktop]
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: download desktop linux artifact
        uses: actions/download-artifact@v8
        with:
          name: devsy-flatpak
          path: desktop/flatpak/

      - name: find and rename .deb file
        working-directory: desktop/flatpak
        run: |
          DEB=$(find . -maxdepth 1 -name '*.deb' -print -quit)
          if [ -n "$DEB" ]; then
            mv "$DEB" devsy-desktop.deb
          else
            echo "No .deb file found"
            exit 1
          fi

      - name: build flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Devsy.flatpak
          manifest-path: desktop/flatpak/sh.devsy.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

      - name: upload flatpak bundle
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./Devsy.flatpak

  prerelease:
    name: Publish Prerelease
    needs: [build-desktop, build-flatpak, deploy-update-metadata]
    permissions:
      contents: write
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          draft: false
