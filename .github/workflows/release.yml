name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: tag name for the release (e.g., v1.0.0)
        required: true
        type: string

jobs:
  build-cli:
    name: Build CLI Binary on ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
          - runner: macos-latest
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --id devsy-${{ steps.os.outputs.runner_os }} --snapshot
        env:
          DEVSY_CLI_VERSION: ${{ inputs.tag || github.ref_name }}
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devsy-${{ steps.os.outputs.runner_os }}
          path: dist/devsy-${{ steps.os.outputs.runner_os }}_*/devsy-${{ steps.os.outputs.runner_os }}-*

  build-desktop:
    name: Build Desktop App (${{ matrix.name }})
    needs: build-cli
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            go-os: linux
            go-arch: amd64
            builder-args: --linux
          - name: macos-arm64
            os: macos-latest
            go-os: darwin
            go-arch: arm64
            builder-args: --mac --arm64
          - name: macos-x64
            os: macos-latest
            go-os: darwin
            go-arch: amd64
            builder-args: --mac --x64
          - name: windows-x64
            os: windows-2022
            go-os: windows
            go-arch: amd64
            builder-args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - name: download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: devsy-*
          path: ${{ runner.temp }}/devsy-bin/
          merge-multiple: true

      - name: inventory and flatten CLI artifacts
        shell: bash
        run: |
          go run ./hack/release_artifacts inventory --dir "${{ runner.temp }}/devsy-bin" --flatten

      - name: stage embedded CLI binary
        shell: bash
        run: |
          go run ./hack/release_artifacts stage \
            --src-dir "${{ runner.temp }}/devsy-bin" \
            --dst-dir desktop/resources/bin \
            --goos "${{ matrix.go-os }}" --goarch "${{ matrix.go-arch }}"

      - name: populate dist for pro provider generation
        if: matrix.name == 'linux-x64'
        shell: bash
        run: |
          go run ./hack/release_artifacts populate-dist \
            --src-dir "${{ runner.temp }}/devsy-bin" --dst-dir dist

      - name: generate pro provider
        if: matrix.name == 'linux-x64'
        working-directory: ./hack/pro
        env:
          PARTIAL: "true"
        run: go run ./main.go ${{ inputs.tag || github.ref_name }} ../../dist > ../../dist/provider.yaml

      - name: configure Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          echo "GYP_MSVS_OVERRIDE_PATH=$vsPath" >> $env:GITHUB_ENV

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: install setuptools
        run: pip install setuptools

      - name: install dependencies
        working-directory: desktop
        run: npm ci

      - name: set version
        shell: bash
        working-directory: desktop
        run: |
          VERSION=${{ inputs.tag || github.ref_name }}
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: install xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: build desktop app
        working-directory: desktop
        run: npx electron-vite build
        env:
          DEVSY_POSTHOG_API_KEY: ${{ secrets.DEVSY_POSTHOG_API_KEY }}

      - name: package and publish with electron-builder (macOS, signed)
        if: runner.os == 'macOS'
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder-args }} --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.DEVSY_APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DEVSY_APPLE_CSC_PASSWORD }}
          APPLE_ID: ${{ secrets.DEVSY_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DEVSY_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DEVSY_APPLE_TEAM_ID }}

      - name: package and publish with electron-builder (non-macOS)
        if: runner.os != 'macOS'
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder-args }} --publish always --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}

      # macOS-only because .app is a directory bundle the CLI can read
      # directly. AppImage / deb / rpm / NSIS would need archive extractors.
      # electron-builder emits arm64 under release/mac-arm64/ and x64 under
      # release/mac/; pick the directory that matches the matrix arch.
      - name: verify packaged macOS app embedded CLI arch
        if: runner.os == 'macOS'
        shell: bash
        env:
          MATRIX_GO_OS: ${{ matrix.go-os }}
          MATRIX_GO_ARCH: ${{ matrix.go-arch }}
        run: |
          set -euo pipefail
          case "$MATRIX_GO_ARCH" in
            arm64) app=desktop/release/mac-arm64/Devsy.app ;;
            amd64) app=desktop/release/mac/Devsy.app ;;
            *) echo "::error::unsupported matrix arch: $MATRIX_GO_ARCH"; exit 1 ;;
          esac
          if [ ! -d "$app" ]; then
            echo "::error::Devsy.app bundle missing for $MATRIX_GO_ARCH at $app"
            ls -la desktop/release || true
            exit 1
          fi
          go run ./hack/release_artifacts verify \
            --file "$app/Contents/Resources/bin/devsy" \
            --goos "$MATRIX_GO_OS" --goarch "$MATRIX_GO_ARCH"

      - name: upload desktop artifacts to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.rpm

      - name: rewrite manifest URLs to GitHub Release assets
        if: hashFiles('desktop/release/latest*.yml', 'desktop/release/beta*.yml') != ''
        # Windows defaults to pwsh; `$REPO`/`$TAG` would be empty PowerShell vars.
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          go run hack/rewrite_manifest_urls/main.go desktop/release/ "$REPO" "$TAG"

      - name: upload update metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: update-metadata-${{ matrix.name }}
          path: |
            desktop/release/latest*.yml
            desktop/release/beta*.yml
          if-no-files-found: ignore

      - name: upload cli assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        if: matrix.name == 'linux-x64'
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./dist/*

      - name: upload desktop linux artifact for flatpak
        if: matrix.name == 'linux-x64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devsy-flatpak
          path: desktop/release/*.deb

  deploy-update-metadata:
    name: Deploy Electron Update Metadata
    needs: [build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: download update metadata artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: update-metadata-*
          path: metadata/

      - name: assemble this channel's manifests
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          mkdir -p upload
          go run hack/merge_mac_metadata/main.go metadata/ upload/
          if [ "$IS_PRERELEASE" = "true" ]; then
            rm -f upload/latest*.yml
            find metadata/ \( -name 'beta.yml' -o -name 'beta-linux.yml' \) \
              -exec cp {} upload/ \;
          else
            rm -f upload/beta*.yml
            find metadata/ \( -name 'latest.yml' -o -name 'latest-linux.yml' \) \
              -exec cp {} upload/ \;
          fi
          ls -la upload/

      - name: upload manifests to R2 (dl.devsy.sh)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DEVSY_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DEVSY_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_S3_API: ${{ secrets.DEVSY_R2_S3_API }}
        run: |
          set -euo pipefail
          bucket="devsy"
          rest="${R2_S3_API#*://}"
          endpoint="${R2_S3_API%%://*}://${rest%%/*}"
          for f in upload/*.yml; do
            name=$(basename "$f")
            aws s3 cp "$f" "s3://${bucket}/desktop/${name}" \
              --endpoint-url "$endpoint" \
              --content-type "text/yaml" \
              --cache-control "public, max-age=0, must-revalidate"
            echo "uploaded desktop/${name}"
          done

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: [build-desktop]
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: download desktop linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: devsy-flatpak
          path: desktop/flatpak/

      - name: find and rename .deb file
        working-directory: desktop/flatpak
        run: |
          DEB=$(find . -maxdepth 1 -name '*.deb' -print -quit)
          if [ -n "$DEB" ]; then
            mv "$DEB" devsy-desktop.deb
          else
            echo "No .deb file found"
            exit 1
          fi

      - name: build flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6
        with:
          bundle: Devsy.flatpak
          manifest-path: desktop/flatpak/sh.devsy.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

      - name: upload flatpak bundle
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./Devsy.flatpak

  prerelease:
    name: Publish Prerelease
    needs: [build-desktop, build-flatpak, deploy-update-metadata]
    permissions:
      contents: write
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          draft: false
