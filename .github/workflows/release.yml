name: Release
on:
  release:
    types: [prereleased]
  workflow_dispatch:
    inputs:
      tag:
        description: tag name for the release (e.g., v1.0.0)
        required: true
        type: string

jobs:
  build-cli:
    name: Build CLI Binary on ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
          - runner: macos-latest
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --id devsy-${{ steps.os.outputs.runner_os }} --snapshot
        env:
          DEVSY_CLI_VERSION: ${{ inputs.tag || github.ref_name }}

      - uses: actions/upload-artifact@v7
        with:
          name: devsy-${{ steps.os.outputs.runner_os }}
          path: dist/devsy-${{ steps.os.outputs.runner_os }}_*/devsy-${{ steps.os.outputs.runner_os }}-*

  build-desktop:
    name: Build Desktop App on ${{ matrix.os }}
    needs: build-cli
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            go-os: linux
            go-arch: amd64
            builder-args: --linux
          - os: macos-latest
            go-os: darwin
            go-arch: universal
            builder-args: --mac
          - os: windows-latest
            go-os: windows
            go-arch: amd64
            builder-args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: get operating system lowercase
        id: os
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS" == "macos" ]; then
            OS="darwin"
          fi
          echo "runner_os=$OS" >> "$GITHUB_OUTPUT"

      - name: download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: devsy-*
          path: ${{ runner.temp }}/devsy-bin/
          merge-multiple: true

      - name: setup CLI binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TEMP_DIR="${{ runner.temp }}"
          mkdir -p desktop/resources/bin

          if [ "${{ matrix.go-arch }}" = "universal" ]; then
            # macOS: use both arch binaries for universal build
            cp "$TEMP_DIR/devsy-bin/devsy-darwin-amd64" desktop/resources/bin/devsy
            chmod +x desktop/resources/bin/devsy
          else
            cp "$TEMP_DIR/devsy-bin/devsy-${{ matrix.go-os }}-${{ matrix.go-arch }}" desktop/resources/bin/devsy
            chmod +x desktop/resources/bin/devsy
          fi

          # Also stage binaries for dist/ upload and provider generation
          mkdir -p dist/
          find "$TEMP_DIR/devsy-bin/" -type f -name "devsy-*" -exec cp {} dist/ \;

      - name: setup CLI binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/resources/bin
          Copy-Item "${{ runner.temp }}/devsy-bin/devsy-windows-amd64.exe" desktop/resources/bin/devsy.exe

      - name: generate pro provider
        if: runner.os == 'Linux'
        working-directory: ./hack/pro
        run: go run ./main.go ${{ inputs.tag || github.ref_name }} ../../desktop/resources/bin > ../../dist/provider.yaml

      - name: configure Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: install setuptools
        run: pip install setuptools

      - name: install dependencies
        working-directory: desktop
        run: npm ci

      - name: set version
        shell: bash
        working-directory: desktop
        run: |
          VERSION=${{ inputs.tag || github.ref_name }}
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: install xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: package with electron-builder
        working-directory: desktop
        run: npx electron-builder ${{ matrix.builder-args }} --config electron-builder.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.rpm

      - name: upload cli assets
        uses: softprops/action-gh-release@v3
        if: runner.os == 'Linux'
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./dist/*

      - name: upload desktop linux artifact for flatpak
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: devsy-flatpak
          path: desktop/release/*.deb

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: [build-desktop]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: download desktop linux artifact
        uses: actions/download-artifact@v8
        with:
          name: devsy-flatpak
          path: desktop/flatpak/

      - name: find and rename .deb file
        working-directory: desktop/flatpak
        run: |
          DEB=$(find . -maxdepth 1 -name '*.deb' -print -quit)
          if [ -n "$DEB" ]; then
            mv "$DEB" devsy-desktop.deb
          else
            echo "No .deb file found"
            exit 1
          fi

      - name: build flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Devsy.flatpak
          manifest-path: desktop/flatpak/dev.devsy.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

      - name: upload flatpak bundle
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: |
            ./Devsy.flatpak

  prerelease:
    name: Publish Prerelease
    needs: [build-desktop, build-flatpak]
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          draft: false
