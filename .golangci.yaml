version: "2"
run:
  timeout: 5m
  concurrency: 8
formatters:
  enable:
    - gci
    - gofumpt
    - goimports
    - golines
linters:
  enable:
    - cyclop
    - decorder
    - dupl
    - errcheck
    - fatcontext
    - forbidigo
    - funcorder
    - funlen
    - goconst
    - gocritic
    - godot
    - gosec
    - lll
    - misspell
    - modernize
    - nestif
    - revive
    - staticcheck
    - unparam
    - unused
    - whitespace
  exclusions:
    rules:
      - linters:
          - gosec
        text: "G101"
        path: "pkg/telemetry/analytics/client.go"
      # Per-IDE async commands and setup functions are intentionally parallel
      # (one package per browser IDE), so dupl across them is by design.
      - linters:
          - dupl
        path: "cmd/internal/agentcontainer/(codeserver|vscodeweb|openvscode)_async.go"
      - linters:
          - dupl
        path: "cmd/internal/agentcontainer/setup.go"
      - path: "hack/"
        linters:
          - forbidigo
          - gosec
  settings:
    cyclop:
      max-complexity: 8
    revive:
      rules:
        - name: argument-limit
          arguments: [4]
        - name: function-result-limit
          arguments: [3]
