id: sh.devsy.devsy

runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk

command: "sh.devsy.devsy"
finish-args:
  - --socket=wayland # Permission needed to show the window
  - --socket=fallback-x11 # Permission needed to show the window
  - --device=dri # OpenGL, not necessary for all projects
  - --share=ipc
  - --share=network
  - --socket=ssh-auth
  - --socket=gpg-agent
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/keyring

modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: devsy
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/devsy-org/devsy/releases/download/${VERSION}/Devsy_linux_amd64.deb
        sha256: ${SHA256}
        only-arches: [x86_64]

      - type: file
        url: https://github.com/devsy-org/devsy/releases/download/${VERSION}/Devsy.desktop
        sha256: ${DESKTOP_SHA256}

      - type: file
        url: https://github.com/devsy-org/devsy/releases/download/${VERSION}/Devsy.metainfo.xml
        sha256: ${META_SHA256}

      - type: file
        path: devsy-wrapper
    build-commands:
      - ar -x *.deb
      - tar -xf data.tar.gz
      - install -Dm755 usr/bin/devsy /app/bin/devsy-bin
      - install -Dm755 devsy-wrapper /app/bin/devsy
      - install -Dm755 "usr/bin/Devsy Desktop" /app/bin/sh.devsy.devsy
      - install -Dm644 Devsy.desktop /app/share/applications/sh.devsy.devsy.desktop
      - desktop-file-edit --set-key Exec --set-value sh.devsy.devsy /app/share/applications/sh.devsy.devsy.desktop
      - desktop-file-edit --set-icon sh.devsy.devsy /app/share/applications/sh.devsy.devsy.desktop
      - install -Dm644 "usr/share/icons/hicolor/128x128/apps/Devsy Desktop.png" /app/share/icons/hicolor/128x128/apps/sh.devsy.devsy.png
      - install -Dm644 "usr/share/icons/hicolor/32x32/apps/Devsy Desktop.png" /app/share/icons/hicolor/32x32/apps/sh.devsy.devsy.png
      - install -Dm644 "usr/share/icons/hicolor/256x256@2/apps/Devsy Desktop.png" /app/share/icons/hicolor/256x256@2/apps/sh.devsy.devsy.png
      - install -Dm644 Devsy.metainfo.xml /app/share/metainfo/sh.devsy.devsy.metainfo.xml
