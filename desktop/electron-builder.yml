appId: sh.devsy.app
productName: Devsy
copyright: Copyright © 2026 Devsy

directories:
  output: release

files:
  - dist/**/*
  - resources/**/*
  - "!resources/bin/.gitkeep"

extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  x64ArchFiles: "Contents/Resources/bin/devsy"
  artifactName: Devsy_${os}_${arch}.${ext}
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # macOS auto-update requires code signing and notarization to be enabled
  notarize: false

dmg:
  sign: false

win:
  icon: resources/icon.ico
  artifactName: Devsy_${os}_${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

linux:
  icon: resources/icons
  category: Development
  artifactName: Devsy_${os}_${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1

rpm:
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - xdg-utils
    - at-spi2-core
    - libuuid

protocols:
  - name: Devsy
    schemes:
      - devsy

publish:
  - provider: generic
    url: https://dl.devsy.sh/desktop
    useMultipleRangeRequest: false
  - provider: github
    owner: devsy-org
    repo: devsy
